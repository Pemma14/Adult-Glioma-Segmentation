# Production configuration for the adult glioma segmentation model.
# This config is used by the clinical inference service.

model:
  model_name: "swin_unetr"
  in_channels: 4
  out_channels: 3
  img_size: [128, 128, 128]
  feature_size: 48
  depths: [2, 2, 2, 2]
  num_heads: [3, 6, 12, 24]
  drop_rate: 0.0
  attn_drop_rate: 0.0
  dropout_path_rate: 0.0
  use_checkpoint: true
  spatial_dims: 3
  normalize: true
  norm_name: "instance"
  deep_supervision: true

registry:
  version: "v1.0.0"
  checkpoint_dir: "models_registry/v1.0.0"
  checkpoint_pattern: "best_model_swin_unetr_fold{i}.pth"
  ensemble_folds: [0, 1, 2, 3, 4]

inference:
  roi_size: [128, 128, 128]
  sw_batch_size: 1
  overlap: 0.5
  overlap_mode: "gaussian"
  threshold: 0.5
  postprocess: "none"
  tta: "none"
