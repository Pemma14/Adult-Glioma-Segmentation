[project]
name = "AdultGliomaSegmentation"
version = "0.1.0"
description = "Service for automated 3D segmentation of adult-type diffuse gliomas"
requires-python = ">=3.12"
dependencies = [
    "clearml>=2.1.7",
    "dvc[s3]>=3.67.1",
    "jupyter>=1.1.1",
    "matplotlib>=3.10.9",
    "monai>=1.3.2",
    "nibabel>=5.4.2",
    "nilearn>=0.13.1",
    "numpy>=2.4.5",
    "pandas>=3.0.3",
    "seaborn>=0.13.2",
    "simpleitk>=2.5.5",
    "tqdm>=4.67.3",
]

[tool.uv]
required-environments = [
    "sys_platform == 'darwin' and platform_machine == 'x86_64'"
]

[tool.setuptools]
packages = []