    "matplotlib>=3.10.9",
    "nibabel>=5.4.2",
    "nilearn>=0.11.1",
    "numpy>=2.4.5",
    "pandas>=3.0.3",
    "seaborn>=0.13.2",
    "simpleitk>=2.5.5",
    "tqdm>=4.67.3",
]
