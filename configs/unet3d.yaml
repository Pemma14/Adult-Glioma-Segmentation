model_name: "unet3d"

# Параметры обучения
batch_size: 4
max_epochs: 100
lr: 0.001
weight_decay: 0.00001
transfer_learning: false

# Параметры пайплайна / инференса
img_size: [128, 128, 128]

# Параметры архитектуры UNet
channels: [16, 32, 64, 128, 256]
strides: [2, 2, 2, 2]
num_res_units: 2
norm: "INSTANCE"
